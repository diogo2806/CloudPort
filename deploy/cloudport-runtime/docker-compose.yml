name: cloudport-runtime

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - cloudport-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cloudport
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - cloudport-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cloudport-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  cloudport-runtime:
    build:
      context: ../..
      dockerfile: backend/cloudport-runtime/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_SCHEMA: ${DB_SCHEMA}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: cloudport
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_LISTENER_CONCURRENCY: ${RABBITMQ_LISTENER_CONCURRENCY:-1}
      RABBITMQ_LISTENER_MAX_CONCURRENCY: ${RABBITMQ_LISTENER_MAX_CONCURRENCY:-1}
      REDIS_USER: ${REDIS_USER:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-}
      CLOUDPORT_SECURITY_INTERNAL_SERVICE_KEY: ${CLOUDPORT_INTERNAL_SERVICE_KEY}
      CLOUDPORT_SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS}
      CLOUDPORT_INSTANCE_ID: ${CLOUDPORT_INSTANCE_ID:-cloudport-runtime-1}
      CLOUDPORT_RUNTIME_REVISION: ${CLOUDPORT_RUNTIME_REVISION:-local}
      CLOUDPORT_WRITES_ENABLED: ${CLOUDPORT_WRITES_ENABLED:-true}
      CLOUDPORT_JOBS_ENABLED: ${CLOUDPORT_JOBS_ENABLED:-true}
      CLOUDPORT_CONSUMERS_ENABLED: ${CLOUDPORT_CONSUMERS_ENABLED:-true}
      CLOUDPORT_MODULO_AUTENTICACAO_INTEGRACAO: local
      CLOUDPORT_MODULO_NAVIO_INTEGRACAO: local
      CLOUDPORT_MODULO_YARD_INTEGRACAO: local
      TOS_API_BASE_URL: ${TOS_API_BASE_URL}
      GATE_ALERTAS_WEBHOOK_URL: ${GATE_ALERTAS_WEBHOOK_URL:-}
      GATE_ALERTAS_BEARER_TOKEN: ${GATE_ALERTAS_BEARER_TOKEN:-}
      DOCUMENT_STORAGE_BASE_PATH: /var/lib/cloudport/documents
    volumes:
      - cloudport-documents:/var/lib/cloudport/documents
    ports:
      - "${CLOUDPORT_PUBLIC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [cloudport]

volumes:
  cloudport-postgres:
  cloudport-rabbitmq:
  cloudport-redis:
  cloudport-documents:

networks:
  cloudport:
    name: cloudport-runtime
