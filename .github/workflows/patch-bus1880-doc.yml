name: Patch BUS1880 documentation

on:
  push:
    branches:
      - docs/issue-792-reconciliar-bus1880
    paths:
      - .github/workflows/patch-bus1880-doc.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/issue-792-reconciliar-bus1880
          fetch-depth: 0
      - name: Reconcile BUS1880 documentation
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/requisitos/requisito-tecnico.md')
          text = path.read_text(encoding='utf-8')

          old_status = "Status: atualizado em 2026-07-20 após auditoria da branch main no commit `0865caed56669e0f42f8d7f25f39ea6251273551`."
          new_status = "Status: atualizado em 2026-07-24 após auditoria da branch main no commit `e96e809be30ada4a3bc1c933fc58c8aa30b1640a`."
          if old_status not in text:
              raise SystemExit('Cabeçalho esperado não encontrado')
          text = text.replace(old_status, new_status, 1)

          pending_row = "| BUS1880 | Implementar ciclo persistido de avisos de estivagem do pátio. | Violações de peso, altura, tipo, reefer, perigoso, reserva, capacidade ou regra de pilha geram aviso identificado; correção é atribuída, revalidada e encerrada somente quando a condição desaparece, reabrindo automaticamente em caso de recorrência. | ⬜ Pendente |\n"
          if pending_row not in text:
              raise SystemExit('Linha pendente BUS1880 não encontrada')
          text = text.replace(pending_row, '', 1)

          old_section = """### BUS1880 — arquivos e métodos

| Caminho completo | Método/campo/contrato | Como está | O que fazer |
|---|---|---|---|
| `backend/servico-yard/src/main/java/br/com/cloudport/servicoyard/scheduler/servico/RealYardReplanningOptimizerService.java` | validação e proposta de posições | Restrições influenciam a escolha e o replanejamento, mas a violação encontrada no estado físico não vira um caso operacional persistido com responsável e ciclo de correção. | Criar detector reproduzível e agregado `AvisoEstivagemPatio`, usando chave estável por unidade, posição e regra para abrir, atualizar, resolver e reabrir avisos. |
| `backend/servico-yard/src/main/java/br/com/cloudport/servicoyard/patio/listatrabalho/servico/OrdemTrabalhoPatioServico.java` | criação e conclusão de movimentos | A execução não comprova revalidação automática dos avisos relacionados à pilha após cada movimento. | Reavaliar posições de origem, destino e vizinhança dentro da transação ou por outbox idempotente, sem encerrar aviso apenas pela conclusão da WI. |
| `frontend/cloudport/src/pages/yard/OperationalYardViews.jsx` | overlays de ocupação e restrição | A interface apresenta estado do pátio, mas não uma fila acionável de avisos com ciclo de correção e verificação. | Exibir badges por pilha e unidade, inspector do aviso, responsável, ação corretiva, histórico e resultado da última revalidação. |

"""
          new_section = """### BUS1880 — implementado

O ciclo persistido de avisos de estivagem do pátio foi concluído pela issue #668 e incorporado pelo PR #789 no commit `e96e809be30ada4a3bc1c933fc58c8aa30b1640a`.

- `AvisoEstivagemPatioServico` detecta e sincroniza violações com chave estável por unidade, posição e regra, preservando abertura, atribuição, correção, revalidação, resolução e reabertura.
- `RealYardReplanningOptimizerService` e o dispatch consultam avisos críticos ativos para bloquear propostas incompatíveis sem impedir movimentação corretiva para posição segura.
- `OrdemTrabalhoPatioServico` reavalia origem, destino, unidade e vizinhança após movimentação física; a conclusão da work instruction não resolve o aviso sem nova validação da condição.
- `OperationalYardViews.jsx` expõe fila operacional, filtros, badges por bloco, pilha, posição e unidade, inspector, responsável, ação corretiva, histórico e resultado da última revalidação.
- A API `/api/yard/stowage-warnings` oferece listagem, resumo, histórico, varredura, atribuição, correção e revalidação, com permissões operacionais e manual contextual no frontend.

A revisão não identificou subitem remanescente do BUS1880. Por isso, nenhum requisito adicional foi desmembrado.

"""
          if old_section not in text:
              raise SystemExit('Seção BUS1880 esperada não encontrada')
          text = text.replace(old_section, new_section, 1)

          path.write_text(text, encoding='utf-8')
      - name: Commit documentation update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/requisitos/requisito-tecnico.md
          git commit -m "docs: reconciliar BUS1880 com implementação entregue (#792)"
          git push origin HEAD:docs/issue-792-reconciliar-bus1880
