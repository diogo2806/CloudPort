server.port=${SIDERURGICO_SERVER_PORT:8085}

spring.application.name=servico-navio-siderurgico

spring.datasource.url=${SIDERURGICO_DB_URL:jdbc:postgresql://localhost:5432/servico_navio_siderurgico}
spring.datasource.username=${SIDERURGICO_DB_USERNAME:postgres}
spring.datasource.password=${SIDERURGICO_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=${SIDERURGICO_FLYWAY_SCHEMA:cloudport_siderurgico}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${SIDERURGICO_FLYWAY_SCHEMA:cloudport_siderurgico}
spring.flyway.schemas=${SIDERURGICO_FLYWAY_SCHEMA:cloudport_siderurgico}
spring.flyway.create-schemas=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

cloudport.runtime.writes-enabled=${CLOUDPORT_WRITES_ENABLED:true}
cloudport.runtime.jobs-enabled=${CLOUDPORT_JOBS_ENABLED:true}
cloudport.integracao.yard.base-url=${YARD_SERVICE_URL:http://localhost:8081}
cloudport.integracao.navio.base-url=${NAVIO_SERVICE_URL:http://localhost:8084}
cloudport.integracao.yard.reconciliacao-ms=${YARD_RECONCILIACAO_MS:60000}
cloudport.integracao.yard.reserva-duracao-minutos=${YARD_RESERVA_DURACAO_MINUTOS:120}
cloudport.integracao.yard.reserva-expiracao-ms=${YARD_RESERVA_EXPIRACAO_MS:60000}
cloudport.integracao.navio.sincronizacao-ms=${NAVIO_SINCRONIZACAO_MS:300000}
cloudport.security.jwt.secret=${JWT_SECRET:chave-local-para-desenvolvimento-123456}
cloudport.security.internal-service-key=${CLOUDPORT_INTERNAL_SERVICE_KEY:}
cloudport.security.cors.allowed-origins=${SIDERURGICO_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4201}
