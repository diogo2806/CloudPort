# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path TO ${DB_SCHEMA}, public

# Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
# O schema é gerenciado exclusivamente pelo Flyway (migrações em db/migration);
# o Hibernate não cria nem altera tabelas, evitando divergência entre código e banco.
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=${DB_SCHEMA}
spring.flyway.default-schema=${DB_SCHEMA}
spring.flyway.create-schemas=true

# Spring Security Configuration
spring.security.user.name=${SPRING_SECURITY_USER_NAME:cloudport}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:cloudport}
jwt.secret=${SECURITY_JWT_SECRET}
api.security.token.secret=${SECURITY_JWT_SECRET}
cloudport.security.jwt.secret=${SECURITY_JWT_SECRET}
cloudport.security.jwt.expiration=${SECURITY_JWT_EXPIRATION_MS}ms
cloudport.bootstrap.admin.email=${ADMIN_EMAIL}
cloudport.bootstrap.admin.password=${ADMIN_PASSWORD}
api.security.self-registration.allowed-roles=${API_SECURITY_SELF_REGISTRATION_ALLOWED_ROLES:USER}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.jpa.open-in-view=false
spring.mvc.cors.allowed-origins=${SPRING_MVC_CORS_ALLOWED_ORIGINS:http://localhost:4200}
