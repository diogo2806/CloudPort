name: Inspecionar alerta CodeQL 18

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  inspect-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar metadados do alerta
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/code-scanning/alerts/18" \
            --output /tmp/alert.json
          python3 - <<'PY'
          import json

          with open('/tmp/alert.json', encoding='utf-8') as arquivo:
              alerta = json.load(arquivo)

          regra = alerta.get('rule') or {}
          instancia = alerta.get('most_recent_instance') or {}
          localizacao = instancia.get('location') or {}
          mensagem = instancia.get('message') or {}

          print('ALERT_NUMBER=' + str(alerta.get('number')))
          print('STATE=' + str(alerta.get('state')))
          print('RULE_ID=' + str(regra.get('id')))
          print('RULE_NAME=' + str(regra.get('name')))
          print('RULE_DESCRIPTION=' + str(regra.get('description')))
          print('SEVERITY=' + str(regra.get('security_severity_level') or regra.get('severity')))
          print('PATH=' + str(localizacao.get('path')))
          print('START_LINE=' + str(localizacao.get('start_line')))
          print('END_LINE=' + str(localizacao.get('end_line')))
          print('MESSAGE=' + str(mensagem.get('text')))
          print('REF=' + str(instancia.get('ref')))
          print('COMMIT_SHA=' + str(instancia.get('commit_sha')))
          PY
