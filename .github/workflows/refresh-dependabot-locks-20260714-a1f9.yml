name: Diagnose regenerated lockfiles

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout security branch
        uses: actions/checkout@v4
        with:
          ref: chore/dependabot-alerts-20260714-a1f9

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate lockfiles
        shell: bash
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --prefix frontend/cloudport
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --prefix frontend/servico-navio-siderurgico

      - name: Create dependency version report
        shell: bash
        run: |
          node <<'NODE' > lock-version-report.log
          const fs = require('node:fs');
          const locks = [
            'frontend/cloudport/package-lock.json',
            'frontend/servico-navio-siderurgico/package-lock.json'
          ];
          const dependencies = [
            '@angular/common', '@angular/compiler', 'launch-editor', 'vite', 'hono',
            'http-proxy-middleware', 'piscina', 'undici', 'tar', 'ws', '@babel/core'
          ];
          for (const lockPath of locks) {
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            console.log(`=== ${lockPath} ===`);
            for (const dependency of dependencies) {
              const entries = Object.entries(lock.packages || {})
                .filter(([path, metadata]) => path.endsWith(`node_modules/${dependency}`) && metadata.version)
                .map(([path, metadata]) => `${path} => ${metadata.version}`);
              console.log(`${dependency}:`);
              if (entries.length === 0) console.log('  not present');
              for (const entry of entries) console.log(`  ${entry}`);
            }
          }
          NODE
          cat lock-version-report.log

      - name: Upload regenerated lockfiles and report
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-lockfiles-diagnostic
          path: |
            frontend/cloudport/package-lock.json
            frontend/servico-navio-siderurgico/package-lock.json
            lock-version-report.log
          if-no-files-found: error
