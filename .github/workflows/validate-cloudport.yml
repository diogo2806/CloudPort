name: Validar CloudPort

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: backend/servico-autenticacao
            command: mvn -B -DskipTests package
          - module: backend/servico-gate
            command: >-
              mvn -B -Dtest=SecurityConfigTest test &&
              mvn -B -DskipTests package
          - module: backend/servico-rail
            command: mvn -B -DskipTests package
          - module: backend/servico-visibilidade
            command: mvn -B test package
          - module: backend/servico-yard
            command: >-
              mvn -B
              -Dtest=OtimizadorRotasPatioServicoTest,OtimizadorDualCyclingServicoTest,WorkQueuePatioServicoTest,WorkQueuePatioControladorAutorizacaoTest,ConsumidoresMigracaoConfiguracaoTest,ObservabilidadeYardFiltroTest
              test &&
              mvn -B -DskipTests package
          - module: backend/servico-navio
            command: mvn -B -DskipTests package
          - module: backend/servico-navio-siderurgico
            command: >-
              mvn -B
              -Dtest=YardRestTemplateCustomizerContractTest,ObservabilidadeOperacionalFiltroTest,ReservaPatioNavioServicoTest,ReconciliacaoNavioPatioJobTest
              test &&
              mvn -B -DskipTests package
          - module: backend/cloudport-navio-modules
            command: >-
              mvn -B -Pmodulo-monolito
              -pl :servico-navio,:servico-navio-siderurgico
              -DskipTests install &&
              mvn -B -Pmodulo-monolito
              -pl :cloudport-monolito-navio
              test package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e validar
        working-directory: ${{ matrix.module }}
        shell: bash
        run: |
          set +e
          eval "${{ matrix.command }}" > /tmp/backend-java.log 2>&1
          status=$?
          tail -n 300 /tmp/backend-java.log > /tmp/backend-java-diagnostico.log
          cat /tmp/backend-java-diagnostico.log
          exit $status
      - name: Publicar diagnóstico do módulo Java
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ strategy.job-index }}-diagnostico
          path: /tmp/backend-java-diagnostico.log
          if-no-files-found: error

  runtime-geral:
    name: Runtime geral CloudPort
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e testar runtime geral
        working-directory: backend/cloudport-modules
        shell: bash
        run: |
          set +e
          {
            mvn -B -Dspring-boot.repackage.skip=true \
              -pl :cloudport-runtime -am \
              -DskipTests install &&
            mvn -B -pl :cloudport-runtime test package
          } > /tmp/cloudport-runtime.log 2>&1
          status=$?
          tail -n 300 /tmp/cloudport-runtime.log > /tmp/cloudport-runtime-diagnostico.log
          cat /tmp/cloudport-runtime-diagnostico.log
          exit $status
      - name: Publicar diagnóstico do runtime geral
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-geral-diagnostico
          path: /tmp/cloudport-runtime-diagnostico.log
          if-no-files-found: error

  deployment-geral:
    name: Imagem e Compose do runtime geral
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: cloudport-ci-postgres
      RABBITMQ_PASSWORD: cloudport-ci-rabbitmq
      JWT_SECRET: cloudport-ci-jwt-secret-with-at-least-32-bytes
      CLOUDPORT_INTERNAL_SERVICE_KEY: cloudport-ci-service-key
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8080
      TOS_API_BASE_URL: http://localhost:8090
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose
        run: docker compose -f deploy/cloudport-runtime/docker-compose.yml config
      - name: Construir imagem do runtime geral
        run: docker build -f backend/cloudport-runtime/Dockerfile -t cloudport-runtime:ci .

  frontend:
    name: Frontend ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Portal React
            module: frontend/cloudport
          - name: Control Room React
            module: frontend/servico-navio-siderurgico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        working-directory: ${{ matrix.module }}
        run: npm install --no-audit --no-fund
      - name: Testar
        working-directory: ${{ matrix.module }}
        run: npm test
      - name: Compilar
        working-directory: ${{ matrix.module }}
        run: npm run build

  deployment-navio:
    name: Smoke do deploy unificado de Navio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose
        run: |
          docker compose -f deploy/navio-monolito/docker-compose.yml --profile monolito config
          SMOKE_JWT_SECRET="$(openssl rand -hex 32)" \
          SMOKE_SERVICE_KEY="$(openssl rand -hex 24)" \
          docker compose \
            -f deploy/navio-monolito/docker-compose.yml \
            -f deploy/navio-monolito/docker-compose.smoke.yml \
            --profile monolito config
      - name: Executar smoke test completo
        run: bash deploy/navio-monolito/smoke-test.sh
      - name: Publicar diagnóstico do smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-navio-diagnostico
          path: /tmp/cloudport-smoke-status.txt
          if-no-files-found: error
