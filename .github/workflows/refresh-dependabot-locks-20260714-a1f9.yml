name: Refresh Dependabot lockfiles

on:
  push:
    branches:
      - chore/dependabot-alerts-20260714-a1f9
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/cloudport/package-lock.json
            frontend/servico-navio-siderurgico/package-lock.json

      - name: Refresh CloudPort lockfile
        working-directory: frontend/cloudport
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Refresh steel vessel service lockfile
        working-directory: frontend/servico-navio-siderurgico
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate CloudPort build
        working-directory: frontend/cloudport
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build

      - name: Validate steel vessel service build
        working-directory: frontend/servico-navio-siderurgico
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build

      - name: Commit regenerated lockfiles
        shell: bash
        run: |
          rm -f .github/workflows/refresh-dependabot-locks-20260714-a1f9.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/cloudport/package-lock.json frontend/servico-navio-siderurgico/package-lock.json .github/workflows/refresh-dependabot-locks-20260714-a1f9.yml
          if git diff --cached --quiet; then
            echo "No lockfile changes were required."
            exit 0
          fi
          git commit -m "chore: atualiza lockfiles contra alertas do Dependabot"
          git push origin HEAD:chore/dependabot-alerts-20260714-a1f9
