services:
  cloudport-monolito:
    environment:
      YARD_RECONCILIACAO_MS: 3600000
      NAVIO_SINCRONIZACAO_MS: 3600000
      JWT_SECRET: ${SMOKE_JWT_SECRET:?SMOKE_JWT_SECRET obrigatoria}
      CLOUDPORT_INTERNAL_SERVICE_KEY: ${SMOKE_SERVICE_KEY:?SMOKE_SERVICE_KEY obrigatoria}
      SECURITY_CORS_ALLOWED_ORIGINS: http://portal-smoke.local,http://localhost:8086
      CONTROL_ROOM_TRUSTED_PARENT_ORIGINS: http://portal-smoke.local
      CLOUDPORT_WRITES_ENABLED: "true"
      CLOUDPORT_JOBS_ENABLED: "false"
      CLOUDPORT_CONSUMERS_ENABLED: "false"
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      SPRING_RABBITMQ_LISTENER_DIRECT_AUTO_STARTUP: "false"
