name: Validar Serviço de Visibilidade

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/servico-visibilidade/**'
      - '.github/workflows/validate-servico-visibilidade.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visibilidade:
    name: Testes e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Executar testes e empacotar
        working-directory: backend/servico-visibilidade
        run: mvn -B test package
