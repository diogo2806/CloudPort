name: Sync Gate Operational Branch

on:
  push:
    branches:
      - feat/gate-operacional-completo-20260717
    paths:
      - .github/workflows/sync-gate-operacional.yml

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main and resolve the known App route conflict
        shell: bash
        run: |
          set -euo pipefail
          cp frontend/cloudport/src/App.jsx /tmp/App.gate.jsx
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge origin/main --no-edit
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -v '^frontend/cloudport/src/App.jsx$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Conflitos inesperados:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            cp /tmp/App.gate.jsx frontend/cloudport/src/App.jsx
            git add frontend/cloudport/src/App.jsx
            git diff --name-only --diff-filter=U | grep . && exit 1 || true
            git commit --no-edit
          fi

          git push origin HEAD:feat/gate-operacional-completo-20260717
