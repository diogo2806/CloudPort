server.port=${MONOLITO_NAVIO_SERVER_PORT:8086}

spring.application.name=cloudport-monolito-navio

# O runtime usa uma unica conexao PostgreSQL e mantem os dados separados por schema.
spring.datasource.url=${MONOLITO_NAVIO_DB_URL}
spring.datasource.username=${MONOLITO_NAVIO_DB_USERNAME}
spring.datasource.password=${MONOLITO_NAVIO_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path TO ${MONOLITO_NAVIO_SCHEMA:cloudport_navio}, ${MONOLITO_SIDERURGICO_SCHEMA:cloudport_siderurgico}, public
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# O auto-configurador unico do Spring e desativado porque cada modulo possui historico Flyway proprio.
spring.flyway.enabled=false
cloudport.monolito.schema.navio=${MONOLITO_NAVIO_SCHEMA:cloudport_navio}
cloudport.monolito.schema.siderurgico=${MONOLITO_SIDERURGICO_SCHEMA:cloudport_siderurgico}

# Remove a chamada HTTP servico-navio-siderurgico -> servico-navio.
cloudport.modulo.navio.integracao=local
cloudport.integracao.yard.base-url=${YARD_SERVICE_URL:http://localhost:8081}
cloudport.integracao.yard.reconciliacao-ms=${YARD_RECONCILIACAO_MS:60000}
cloudport.integracao.navio.sincronizacao-ms=${NAVIO_SINCRONIZACAO_MS:300000}

cloudport.security.jwt.secret=${JWT_SECRET}
cloudport.security.internal-service-key=${CLOUDPORT_INTERNAL_SERVICE_KEY:}
cloudport.security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}
