name: Diagnose Angular package versions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose-angular-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/dependabot-alerts-20260714-a1f9

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Query Angular package versions
        shell: bash
        run: |
          {
            for package in \
              '@angular/cdk' \
              '@angular/material' \
              '@angular-devkit/build-angular' \
              '@angular/cli' \
              '@angular/compiler-cli'; do
              echo "=== $package ==="
              echo "latest=$(npm view "$package" version 2>&1)"
              echo "latest-21=$(npm view "$package@21" version 2>&1 | tail -n 1)"
              echo "exact-21.2.17=$(npm view "$package@21.2.17" version 2>&1)"
            done
          } > angular-package-versions.log
          cat angular-package-versions.log

      - name: Upload version report
        uses: actions/upload-artifact@v4
        with:
          name: angular-package-versions
          path: angular-package-versions.log
          if-no-files-found: error
