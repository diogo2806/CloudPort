name: Validar CloudPort

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: backend/servico-yard
            command: mvn -B -DskipTests package
          - module: backend/servico-navio
            command: mvn -B -DskipTests package
          - module: backend/servico-navio-siderurgico
            command: mvn -B -DskipTests package
          - module: backend/cloudport-navio-modules
            command: >-
              mvn -B -Pmodulo-monolito
              -pl :servico-navio,:servico-navio-siderurgico
              -DskipTests install &&
              mvn -B -Pmodulo-monolito
              -pl :cloudport-monolito-navio
              test package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e validar
        working-directory: ${{ matrix.module }}
        run: ${{ matrix.command }}

  frontend:
    name: Frontend Angular
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - frontend/cloudport
          - frontend/servico-navio-siderurgico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.module }}/package-lock.json
      - name: Instalar dependencias
        working-directory: ${{ matrix.module }}
        run: npm ci
      - name: Compilar
        working-directory: ${{ matrix.module }}
        run: npm run build

  deployment-navio:
    name: Deploy unificado de Navio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose
        run: docker compose -f deploy/navio-monolito/docker-compose.yml --profile monolito config
      - name: Construir imagem do runtime unificado
        run: docker build -f backend/cloudport-monolito-navio/Dockerfile -t cloudport-monolito-navio:ci .
