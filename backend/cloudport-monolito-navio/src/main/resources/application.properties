server.port=${CLOUDPORT_SERVER_PORT:${MONOLITO_NAVIO_SERVER_PORT:8086}}
server.forward-headers-strategy=framework

spring.application.name=cloudport-monolito-rollback
spring.main.allow-bean-definition-overriding=false
cloudport.rollback.enabled=${CLOUDPORT_ROLLBACK_ENABLED:false}

spring.datasource.url=${CLOUDPORT_DB_URL:${MONOLITO_NAVIO_DB_URL}}
spring.datasource.username=${CLOUDPORT_DB_USERNAME:${MONOLITO_NAVIO_DB_USERNAME}}
spring.datasource.password=${CLOUDPORT_DB_PASSWORD:${MONOLITO_NAVIO_DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path TO ${MONOLITO_NAVIO_SCHEMA:cloudport_navio}, ${MONOLITO_SIDERURGICO_SCHEMA:cloudport_siderurgico}, ${MONOLITO_YARD_SCHEMA:cloudport_yard}, ${MONOLITO_GATE_SCHEMA:cloudport_gate}, ${MONOLITO_RAIL_SCHEMA:cloudport_rail}, ${MONOLITO_AUTENTICACAO_SCHEMA:cloudport_autenticacao}, ${MONOLITO_VISIBILIDADE_SCHEMA:cloudport_visibilidade}, public
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false
cloudport.monolito.schema.navio=${MONOLITO_NAVIO_SCHEMA:cloudport_navio}
cloudport.monolito.schema.siderurgico=${MONOLITO_SIDERURGICO_SCHEMA:cloudport_siderurgico}
cloudport.monolito.schema.yard=${MONOLITO_YARD_SCHEMA:cloudport_yard}
cloudport.monolito.schema.gate=${MONOLITO_GATE_SCHEMA:cloudport_gate}
cloudport.monolito.schema.rail=${MONOLITO_RAIL_SCHEMA:cloudport_rail}
cloudport.monolito.schema.autenticacao=${MONOLITO_AUTENTICACAO_SCHEMA:cloudport_autenticacao}
cloudport.monolito.schema.visibilidade=${MONOLITO_VISIBILIDADE_SCHEMA:cloudport_visibilidade}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/public/v1/**,/visitas-navio/**,/navios-siderurgicos/**,/navios/**
springdoc.packages-to-scan=br.com.cloudport.serviconavio,br.com.cloudport.serviconaviosiderurgico

cloudport.runtime.writes-enabled=${CLOUDPORT_WRITES_ENABLED:false}
cloudport.runtime.jobs-enabled=${CLOUDPORT_JOBS_ENABLED:false}
cloudport.runtime.consumers-enabled=${CLOUDPORT_CONSUMERS_ENABLED:false}
cloudport.modulo.navio.integracao=local
cloudport.modulo.yard.integracao=local
cloudport.modulo.yard.status-integracao=local
cloudport.modulo.autenticacao.integracao=local

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.auto-startup=${CLOUDPORT_CONSUMERS_ENABLED:false}
spring.rabbitmq.listener.direct.auto-startup=${CLOUDPORT_CONSUMERS_ENABLED:false}

spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}

cloudport.security.jwt.secret=${JWT_SECRET}
jwt.secret=${JWT_SECRET}
api.security.token.secret=${JWT_SECRET}
cloudport.security.internal-service-key=${CLOUDPORT_INTERNAL_SERVICE_KEY:}
cloudport.security.public-api.clients=${CLOUDPORT_PUBLIC_API_CLIENTS:cloudport-local:troque-esta-chave-publica}
cloudport.security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}
app.security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}
api.security.self-registration.allowed-roles=${API_SECURITY_SELF_REGISTRATION_ALLOWED_ROLES:USER}

cloudport.integracao.yard.contingencia-consultas-enabled=${YARD_CONTINGENCIA_CONSULTAS_ENABLED:false}
cloudport.integracao.yard.reconciliacao-ms=${YARD_RECONCILIACAO_MS:60000}
cloudport.integracao.yard.reserva-duracao-minutos=${YARD_RESERVA_DURACAO_MINUTOS:120}
cloudport.integracao.yard.reserva-expiracao-ms=${YARD_RESERVA_EXPIRACAO_MS:60000}
cloudport.integracao.navio.sincronizacao-ms=${NAVIO_SINCRONIZACAO_MS:300000}
cloudport.yard.eventos.exchange=${YARD_EVENTOS_EXCHANGE:yard.eventos}
cloudport.yard.eventos.routing-movimento=${YARD_EVENTOS_ROUTING_MOVIMENTO:yard.movimento.registrado}
cloudport.yard.integracoes.ferrovia.exchange=${YARD_FERROVIA_EXCHANGE:ferrovia.eventos}
cloudport.yard.integracoes.ferrovia.queue=${YARD_FERROVIA_QUEUE:yard.movimentacao.trem}
cloudport.yard.integracoes.ferrovia.routing=${YARD_FERROVIA_ROUTING:rail.movimentacao.concluida}
cloudport.rail.eventos.exchange=${RAIL_EVENTOS_EXCHANGE:ferrovia.eventos}
cloudport.rail.eventos.routing-movimentacao=${RAIL_EVENTOS_ROUTING_MOVIMENTACAO:rail.movimentacao.concluida}

cloudport.gate.contingencia.enabled=${GATE_CONTINGENCIA_ENABLED:false}
cloudport.gate.ocr.tempo-maximo-processamento=${GATE_OCR_TIMEOUT:PT5S}
gate.barcode.habilitado=${GATE_BARCODE_HABILITADO:false}
gate.reconciliacao.cron=${GATE_RECONCILIACAO_CRON:0 0 2 * * *}
cloudport.tos.api.base-url=${TOS_API_BASE_URL:http://localhost:8080}
cloudport.tos.api.timeout=${TOS_API_TIMEOUT_MS:5000}
cloudport.document-storage.provider=${DOCUMENT_STORAGE_PROVIDER:local}
cloudport.document-storage.base-path=${DOCUMENT_STORAGE_BASE_PATH:/var/lib/cloudport/documents}
cloudport.document-storage.bucket=${DOCUMENT_STORAGE_BUCKET:cloudport-documents}

spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
