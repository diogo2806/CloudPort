server:
  port: ${VISIBILIDADE_SERVER_PORT:8085}

spring:
  application:
    name: servico-visibilidade

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloudport_visibilidade}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: ${RABBITMQ_LISTENER_CONCURRENCY:5}
        max-concurrency: ${RABBITMQ_LISTENER_MAX_CONCURRENCY:10}

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: ${REDIS_TIMEOUT_MS:60000}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}

cloudport:
  visibilidade:
    eventos:
      legado:
        exchange: ${VISIBILIDADE_EVENTOS_LEGADO_EXCHANGE:port.events}
      yard:
        exchange: ${VISIBILIDADE_YARD_EXCHANGE:yard.eventos}
        routing: ${VISIBILIDADE_YARD_ROUTING:yard.movimento.registrado}
      rail:
        exchange: ${VISIBILIDADE_RAIL_EXCHANGE:ferrovia.eventos}
        routing: ${VISIBILIDADE_RAIL_ROUTING:rail.movimentacao.concluida}

visibilidade:
  dashboard:
    refresh-ms: ${VISIBILIDADE_DASHBOARD_REFRESH_MS:30000}
  alertas:
    refresh-ms: ${VISIBILIDADE_ALERTAS_REFRESH_MS:60000}
  gate:
    meta-movimentos-dia: ${VISIBILIDADE_GATE_META_MOVIMENTOS_DIA:1200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    br.com.cloudport.visibilidade: INFO
    org.springframework.amqp: INFO
