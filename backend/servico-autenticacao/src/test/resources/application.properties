spring.datasource.url=jdbc:h2:mem:servicoautenticacao;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Em teste o schema é criado pelo Hibernate em H2; as migrações Flyway são
# específicas de PostgreSQL e validadas separadamente em VerificacaoMigracoesTest.
spring.flyway.enabled=false
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
api.security.token.secret=segredo-de-teste-com-pelo-menos-256-bits-1234567890
