name: Validar CloudPort

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: backend/servico-yard
            command: mvn -B -DskipTests package
          - module: backend/servico-navio
            command: mvn -B -DskipTests package
          - module: backend/servico-navio-siderurgico
            command: mvn -B -DskipTests package
          - module: backend/cloudport-navio-modules
            command: >-
              mvn -B -Pmodulo-monolito
              -pl :servico-navio,:servico-navio-siderurgico
              -DskipTests install &&
              mvn -B -Pmodulo-monolito
              -pl :cloudport-monolito-navio
              test package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e validar
        working-directory: ${{ matrix.module }}
        run: |
          if [ "${{ matrix.module }}" = "backend/cloudport-navio-modules" ]; then
            set +e
            ${{ matrix.command }} > maven-validation.log 2>&1
            status=$?
            tail -n 220 maven-validation.log
            exit $status
          fi
          ${{ matrix.command }}
      - name: Publicar log Maven do monolito
        if: failure() && matrix.module == 'backend/cloudport-navio-modules'
        uses: actions/upload-artifact@v4
        with:
          name: monolito-maven-log
          path: backend/cloudport-navio-modules/maven-validation.log
          if-no-files-found: error

  frontend:
    name: Frontend Angular
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - frontend/cloudport
          - frontend/servico-navio-siderurgico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.module }}/package-lock.json
      - name: Instalar dependencias
        working-directory: ${{ matrix.module }}
        run: npm ci
      - name: Compilar
        working-directory: ${{ matrix.module }}
        run: npm run build
