name: Diagnose Dependabot lockfiles

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/dependabot-alerts-20260714-a1f9

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture npm resolution error
        shell: bash
        working-directory: frontend/cloudport
        run: |
          set +e
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --force > ../../npm-cloudport-resolution.log 2>&1
          status=$?
          echo "exit_code=$status" >> ../../npm-cloudport-resolution.log
          cat ../../npm-cloudport-resolution.log
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: npm-cloudport-resolution
          path: npm-cloudport-resolution.log
          if-no-files-found: error
