name: Refresh and validate Dependabot lockfiles

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout security branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: chore/dependabot-alerts-20260714-a1f9

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/cloudport/package-lock.json
            frontend/servico-navio-siderurgico/package-lock.json

      - name: Refresh CloudPort lockfile
        working-directory: frontend/cloudport
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Refresh steel vessel service lockfile
        working-directory: frontend/servico-navio-siderurgico
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Assert patched dependency versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const locks = [
            'frontend/cloudport/package-lock.json',
            'frontend/servico-navio-siderurgico/package-lock.json'
          ];
          const parse = (version) => version.split('-')[0].split('.').map((part) => Number(part) || 0);
          const compare = (left, right) => {
            const a = parse(left);
            const b = parse(right);
            for (let i = 0; i < Math.max(a.length, b.length); i += 1) {
              const difference = (a[i] || 0) - (b[i] || 0);
              if (difference !== 0) return difference;
            }
            return 0;
          };
          const checks = [
            ['@angular/common', (v) => compare(v, '21.2.17') >= 0],
            ['@angular/compiler', (v) => compare(v, '21.2.17') >= 0],
            ['launch-editor', (v) => compare(v, '2.14.1') >= 0],
            ['vite', (v) => parse(v)[0] !== 7 || compare(v, '7.3.5') >= 0],
            ['hono', (v) => compare(v, '4.12.25') >= 0],
            ['http-proxy-middleware', (v) => !(compare(v, '3.0.4') >= 0 && compare(v, '3.0.7') < 0)],
            ['piscina', (v) => parse(v)[0] !== 5 || compare(v, '5.2.0') >= 0],
            ['undici', (v) => parse(v)[0] !== 7 || compare(v, '7.28.0') >= 0],
            ['tar', (v) => parse(v)[0] !== 7 || compare(v, '7.5.16') >= 0],
            ['ws', (v) => parse(v)[0] !== 8 || compare(v, '8.21.0') >= 0],
            ['@babel/core', (v) => parse(v)[0] !== 7 || compare(v, '7.29.6') >= 0]
          ];
          const failures = [];
          for (const lockPath of locks) {
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            for (const [dependency, isSafe] of checks) {
              const versions = Object.entries(lock.packages || {})
                .filter(([path, metadata]) => path.endsWith(`node_modules/${dependency}`) && metadata.version)
                .map(([, metadata]) => metadata.version);
              for (const version of versions) {
                if (!isSafe(version)) failures.push(`${lockPath}: ${dependency}@${version}`);
              }
            }
          }
          if (failures.length > 0) {
            console.error('Vulnerable versions remain in lockfiles:');
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }
          console.log('All listed Dependabot dependency ranges are patched.');
          NODE

      - name: Validate CloudPort build and audit
        working-directory: frontend/cloudport
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
          npm audit --audit-level=moderate

      - name: Validate steel vessel service build and audit
        working-directory: frontend/servico-navio-siderurgico
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
          npm audit --audit-level=moderate

      - name: Commit regenerated lockfiles
        shell: bash
        run: |
          rm -f .github/workflows/refresh-dependabot-locks-20260714-a1f9.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/cloudport/package.json frontend/cloudport/package-lock.json frontend/servico-navio-siderurgico/package.json frontend/servico-navio-siderurgico/package-lock.json .github/workflows/refresh-dependabot-locks-20260714-a1f9.yml
          git commit -m "chore: corrige alertas de segurança do Dependabot"
          git push origin HEAD:chore/dependabot-alerts-20260714-a1f9
