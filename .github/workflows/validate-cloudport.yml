name: Validar CloudPort

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: backend/cloudport-contracts
            command: mvn -B verify
          - module: backend/servico-autenticacao
            command: mvn -B verify
          - module: backend/servico-gate
            command: mvn -B verify
          - module: backend/servico-rail
            command: mvn -B verify
          - module: backend/servico-visibilidade
            command: mvn -B verify
          - module: backend/servico-yard
            command: >-
              mvn -B -f ../cloudport-contracts/pom.xml -DskipTests install &&
              mvn -B verify
          - module: backend/servico-navio
            command: >-
              mvn -B -f ../cloudport-contracts/pom.xml -DskipTests install &&
              mvn -B verify
          - module: backend/servico-navio-siderurgico
            command: >-
              mvn -B -f ../cloudport-contracts/pom.xml -DskipTests install &&
              mvn -B verify
          - module: backend/servico-carga-geral
            command: mvn -B verify
          - module: backend/cloudport-navio-modules
            command: >-
              mvn -B -Pmodulo-monolito
              -pl :servico-navio,:servico-navio-siderurgico
              -am -DskipTests install &&
              mvn -B -Pmodulo-monolito
              -pl :cloudport-monolito-navio
              -am verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e executar testes
        working-directory: ${{ matrix.module }}
        shell: bash
        run: |
          set +e
          eval "${{ matrix.command }}" > /tmp/backend-java.log 2>&1
          status=$?
          tail -n 300 /tmp/backend-java.log > /tmp/backend-java-diagnostico.log
          cat /tmp/backend-java-diagnostico.log
          exit $status
      - name: Publicar diagnóstico do módulo Java
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ strategy.job-index }}-diagnostico
          path: /tmp/backend-java-diagnostico.log
          if-no-files-found: error

  runtime-geral:
    name: Runtime canônico CloudPort
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e testar runtime canônico
        working-directory: backend/cloudport-modules
        shell: bash
        run: |
          set +e
          {
            mvn -B -N -f ../cloudport-navio-modules/pom.xml -DskipTests install &&
            mvn -B -Dspring-boot.repackage.skip=true \
              -pl :cloudport-runtime -am \
              -DskipTests install &&
            mvn -B -pl :cloudport-runtime verify
          } > /tmp/cloudport-runtime.log 2>&1
          status=$?
          tail -n 300 /tmp/cloudport-runtime.log > /tmp/cloudport-runtime-diagnostico.log
          cat /tmp/cloudport-runtime-diagnostico.log
          exit $status
      - name: Publicar diagnóstico do runtime canônico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-geral-diagnostico
          path: /tmp/cloudport-runtime-diagnostico.log
          if-no-files-found: error

  backend-validado:
    name: Backend aprovado para deploy
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend
      - runtime-geral
    steps:
      - name: Bloquear deploy quando houver falha nos testes
        shell: bash
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || "${{ needs['runtime-geral'].result }}" != "success" ]]; then
            echo "Os testes do backend falharam. O deploy foi bloqueado." >&2
            exit 1
          fi

  deployment-geral:
    name: Imagem e Compose do runtime canônico
    runs-on: ubuntu-latest
    needs: backend-validado
    env:
      POSTGRES_PASSWORD: cloudport-ci-postgres
      RABBITMQ_PASSWORD: cloudport-ci-rabbitmq
      JWT_SECRET: cloudport-ci-jwt-secret-with-at-least-32-bytes
      CLOUDPORT_INTERNAL_SERVICE_KEY: cloudport-ci-service-key
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8080
      TOS_API_BASE_URL: http://localhost:8090
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose
        run: |
          DB_NAME=cloudport DB_USER=cloudport DB_PASS="$POSTGRES_PASSWORD" \
          DB_SCHEMA=cloudport_autenticacao,cloudport_carga_geral,cloudport_gate,cloudport_rail,cloudport_visibilidade,cloudport_yard,cloudport_navio,cloudport_siderurgico \
          SECURITY_JWT_SECRET="$JWT_SECRET" SECURITY_JWT_EXPIRATION_MS=7200000 \
          ADMIN_EMAIL=admin@cloudport.test ADMIN_PASSWORD=cloudport-admin \
          CLOUDPORT_INTERNAL_SERVICE_KEY="$CLOUDPORT_INTERNAL_SERVICE_KEY" \
          docker compose -f deploy/cloudport-runtime/docker-compose.yml config
      - name: Construir imagem do runtime canônico pela raiz
        run: docker build -f backend/cloudport-runtime/Dockerfile -t cloudport-runtime:ci .
      - name: Construir imagem do runtime canônico no contexto do EasyPanel
        run: docker build -f backend/Dockerfile -t cloudport-runtime-easypanel:ci backend

  corte-operacional:
    name: Provar corte e rollback do monólito modular
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Preparar diretório de evidências
        run: mkdir -p /tmp/cloudport-cutover-evidence
      - name: Validar contratos de TOS, OCR e EDI
        id: preflight
        continue-on-error: true
        shell: bash
        run: |
          set +e
          LOG=/tmp/cloudport-cutover-preflight.log
          : > "$LOG"
          status=0
          executar() {
            echo "===== $1 =====" | tee -a "$LOG"
            shift
            "$@" 2>&1 | tee -a "$LOG"
            comando_status=${PIPESTATUS[0]}
            if [[ $comando_status -ne 0 ]]; then
              status=$comando_status
            fi
          }
          executar contracts mvn -B -f backend/cloudport-contracts/pom.xml -DskipTests install
          executar gate mvn -B -f backend/servico-gate/pom.xml \
            -Dtest=TosIntegrationServiceTest,TosConsumerContractTest,ProcessamentoOcrRecuperacaoJobTest,ProcessamentoOcrRecuperacaoJobCondicaoTest \
            test
          executar yard mvn -B -f backend/servico-yard/pom.xml \
            -Dtest=EdiMensagemListenerServicoTest,ConsumidoresMigracaoConfiguracaoTest \
            test
          exit "$status"
      - name: Executar prova do runtime canônico e retorno para rollback
        if: always()
        env:
          CLOUDPORT_RUNTIME_REVISAO: ${{ github.sha }}
        run: bash deploy/cloudport-runtime/provar-corte.sh
      - name: Publicar evidências do corte operacional
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-corte-operacional
          path: |
            /tmp/cloudport-cutover-evidence
            /tmp/cloudport-cutover-preflight.log
          if-no-files-found: error
      - name: Confirmar preflight do corte
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.preflight.outcome }}" != "success" ]]; then
            echo "O preflight de TOS, OCR ou EDI falhou. Consulte cloudport-cutover-preflight.log no artefato." >&2
            exit 1
          fi

  frontend:
    name: Frontend ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Portal React
            module: frontend/cloudport
          - name: Control Room React
            module: frontend/servico-navio-siderurgico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        working-directory: ${{ matrix.module }}
        run: npm install --no-audit --no-fund
      - name: Testar
        working-directory: ${{ matrix.module }}
        shell: bash
        run: |
          set +e
          npm test > /tmp/frontend-testes.log 2>&1
          status=$?
          cat /tmp/frontend-testes.log
          exit $status
      - name: Publicar diagnóstico do frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ strategy.job-index }}-diagnostico
          path: /tmp/frontend-testes.log
          if-no-files-found: error
      - name: Compilar
        working-directory: ${{ matrix.module }}
        run: npm run build

  rollback-navio:
    name: Validar runtime anterior de rollback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose de rollback
        run: |
          docker compose -f deploy/navio-monolito/docker-compose.yml --profile rollback config
          SMOKE_JWT_SECRET="$(openssl rand -hex 32)" \
          SMOKE_SERVICE_KEY="$(openssl rand -hex 24)" \
          docker compose \
            -f deploy/navio-monolito/docker-compose.yml \
            -f deploy/navio-monolito/docker-compose.smoke.yml \
            --profile rollback config
      - name: Executar smoke do rollback
        run: bash deploy/navio-monolito/smoke-test.sh
      - name: Publicar diagnóstico do smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-navio-rollback-diagnostico
          path: /tmp/cloudport-smoke-status.txt
