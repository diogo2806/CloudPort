server.port=${CLOUDPORT_SERVER_PORT:8080}
spring.application.name=cloudport-runtime
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path TO ${cloudport.runtime.schema.autenticacao}, ${cloudport.runtime.schema.carga-geral}, ${cloudport.runtime.schema.gate}, ${cloudport.runtime.schema.rail}, ${cloudport.runtime.schema.visibilidade}, ${cloudport.runtime.schema.yard}, ${cloudport.runtime.schema.navio}, ${cloudport.runtime.schema.siderurgico}, public
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:8}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.register-mbeans=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.hbm2ddl.jdbc_metadata_extraction_strategy=individually
spring.flyway.enabled=false
spring.main.allow-bean-definition-overriding=false
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:true}

server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS:2}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:50}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:1000}
spring.task.execution.pool.core-size=${ASYNC_CORE_POOL_SIZE:2}
spring.task.execution.pool.max-size=${ASYNC_MAX_POOL_SIZE:4}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:100}
spring.task.execution.pool.keep-alive=${ASYNC_KEEP_ALIVE:60s}

cloudport.runtime.schema.autenticacao=cloudport_autenticacao
cloudport.runtime.schema.carga-geral=cloudport_carga_geral
cloudport.runtime.schema.gate=cloudport_gate
cloudport.runtime.schema.rail=cloudport_rail
cloudport.runtime.schema.visibilidade=cloudport_visibilidade
cloudport.runtime.schema.yard=cloudport_yard
cloudport.runtime.schema.navio=cloudport_navio
cloudport.runtime.schema.siderurgico=cloudport_siderurgico
cloudport.runtime.writes-enabled=${CLOUDPORT_WRITES_ENABLED:true}
cloudport.runtime.jobs-enabled=${CLOUDPORT_JOBS_ENABLED:false}
cloudport.modulo.autenticacao.integracao=local
cloudport.modulo.navio.integracao=local
cloudport.modulo.yard.integracao=local
cloudport.modulo.yard.status-integracao=local
cloudport.modulo.inventario.integracao=local
cloudport.modulo.capacidade-carga-geral.integracao=local
cloudport.modulo.gate-carga-geral.integracao=local

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.concurrency=${RABBITMQ_LISTENER_CONCURRENCY:1}
spring.rabbitmq.listener.simple.max-concurrency=${RABBITMQ_LISTENER_MAX_CONCURRENCY:3}
spring.rabbitmq.listener.simple.prefetch=${RABBITMQ_LISTENER_PREFETCH:10}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=${REDIS_TIMEOUT_MS:60000}

cloudport.integracao.yard.contingencia-consultas-enabled=${YARD_CONTINGENCIA_CONSULTAS_ENABLED:false}
cloudport.integracao.yard.reconciliacao-ms=${YARD_RECONCILIACAO_MS:60000}
cloudport.integracao.yard.reserva-duracao-minutos=${YARD_RESERVA_DURACAO_MINUTOS:120}
cloudport.integracao.yard.reserva-expiracao-ms=${YARD_RESERVA_EXPIRACAO_MS:60000}
cloudport.integracao.navio.sincronizacao-ms=${NAVIO_SINCRONIZACAO_MS:300000}

cloudport.yard.eventos.exchange=${YARD_EVENTOS_EXCHANGE:yard.eventos}
cloudport.yard.eventos.routing-movimento=${YARD_EVENTOS_ROUTING_MOVIMENTO:yard.movimento.registrado}
cloudport.yard.integracoes.ferrovia.exchange=${YARD_FERROVIA_EXCHANGE:ferrovia.eventos}
cloudport.yard.integracoes.ferrovia.queue=${YARD_FERROVIA_QUEUE:yard.movimentacao.trem}
cloudport.yard.integracoes.ferrovia.routing=${YARD_FERROVIA_ROUTING:rail.movimentacao.concluida}
cloudport.yard.integracoes.edi.exchange=${EDI_EXCHANGE:edi.mensagens}
cloudport.yard.integracoes.edi.queue.coprar=${EDI_QUEUE_COPRAR:edi.mensagens.coprar}
cloudport.yard.integracoes.edi.queue.coarri=${EDI_QUEUE_COARRI:edi.mensagens.coarri}
cloudport.yard.integracoes.edi.routing.coprar=${EDI_ROUTING_COPRAR:edi.coprar}
cloudport.yard.integracoes.edi.routing.coarri=${EDI_ROUTING_COARRI:edi.coarri}

cloudport.rail.eventos.exchange=${RAIL_EVENTOS_EXCHANGE:ferrovia.eventos}
cloudport.rail.eventos.routing-movimentacao=${RAIL_EVENTOS_ROUTING_MOVIMENTACAO:rail.movimentacao.concluida}

cloudport.visibilidade.eventos.legado.exchange=${VISIBILIDADE_EVENTOS_LEGADO_EXCHANGE:port.events}
cloudport.visibilidade.eventos.yard.exchange=${VISIBILIDADE_YARD_EXCHANGE:yard.eventos}
cloudport.visibilidade.eventos.yard.routing=${VISIBILIDADE_YARD_ROUTING:yard.movimento.registrado}
cloudport.visibilidade.eventos.rail.exchange=${VISIBILIDADE_RAIL_EXCHANGE:ferrovia.eventos}
cloudport.visibilidade.eventos.rail.routing=${VISIBILIDADE_RAIL_ROUTING:rail.movimentacao.concluida}
cloudport.visibilidade.eventos.rail.rejeitados.exchange=${VISIBILIDADE_RAIL_REJEITADOS_EXCHANGE:visibilidade.rail.rejeitados}
cloudport.visibilidade.eventos.rail.rejeitados.queue=${VISIBILIDADE_RAIL_REJEITADOS_QUEUE:visibilidade.rail.rejeitados}
cloudport.visibilidade.eventos.rail.rejeitados.routing=${VISIBILIDADE_RAIL_REJEITADOS_ROUTING:rail.rejeitado}
visibilidade.dashboard.refresh-ms=${VISIBILIDADE_DASHBOARD_REFRESH_MS:30000}
visibilidade.alertas.refresh-ms=${VISIBILIDADE_ALERTAS_REFRESH_MS:60000}
visibilidade.gate.meta-movimentos-dia=${VISIBILIDADE_GATE_META_MOVIMENTOS_DIA:1200}

cloudport.security.jwt.secret=${SECURITY_JWT_SECRET}
cloudport.security.jwt.expiration=${SECURITY_JWT_EXPIRATION_MS}ms
api.security.token.secret=${SECURITY_JWT_SECRET}
jwt.secret=${SECURITY_JWT_SECRET}
cloudport.bootstrap.admin.email=${ADMIN_EMAIL}
cloudport.bootstrap.admin.password=${ADMIN_PASSWORD}
cloudport.security.public-api.clients=${CLOUDPORT_PUBLIC_API_CLIENTS:}
cloudport.security.autenticacao.base-url=${GATE_SECURITY_AUTENTICACAO_BASE_URL:http://localhost:8080}
cloudport.integracoes.yard.base-url=${GATE_INTEGRACAO_YARD_BASE_URL:http://localhost:8081}
cloudport.integracoes.yard.status-path=${GATE_INTEGRACAO_YARD_STATUS_PATH:/yard/status}
cloudport.integracoes.yard.fallback-orientacao=${GATE_INTEGRACAO_YARD_FALLBACK:Consultar equipe de patio para orientacoes manuais.}
cloudport.security.autenticacao.fallback-orientacao=${GATE_AUTENTICACAO_FALLBACK:Validar credenciais manualmente e registrar acessos temporarios.}

cloudport.tos.api.base-url=${TOS_API_BASE_URL:http://localhost:8090}
cloudport.tos.api.timeout=${TOS_API_TIMEOUT_MS:5000}
cloudport.tos.api.booking-path=${TOS_API_BOOKING_PATH:/tos/bookings/{bookingNumber}}
cloudport.tos.api.container-status-path=${TOS_API_CONTAINER_STATUS_PATH:/tos/containers/{containerNumber}/status}
cloudport.tos.api.customs-release-path=${TOS_API_CUSTOMS_RELEASE_PATH:/tos/containers/{containerNumber}/customs}
cloudport.tos.api.username=${TOS_API_USERNAME:}
cloudport.tos.api.password=${TOS_API_PASSWORD:}
cloudport.tos.retry.max-attempts=${TOS_API_RETRY_ATTEMPTS:3}
cloudport.tos.retry.initial-interval=${TOS_API_RETRY_INTERVAL_MS:500}
cloudport.tos.retry.multiplier=${TOS_API_RETRY_MULTIPLIER:2.0}
cloudport.tos.cache.max-size=${TOS_API_CACHE_MAX_SIZE:200}
cloudport.tos.cache.ttl=${TOS_API_CACHE_TTL:PT5M}

cloudport.gate.flow.tolerancia-entrada-antecipada=${GATE_TOL_ENTRADA_ANTEC:PT30M}
cloudport.gate.flow.tolerancia-entrada-atraso=${GATE_TOL_ENTRADA_ATRASO:PT30M}
cloudport.gate.flow.tolerancia-saida-antecipada=${GATE_TOL_SAIDA_ANTEC:PT30M}
cloudport.gate.flow.tolerancia-saida-atraso=${GATE_TOL_SAIDA_ATRASO:PT30M}
cloudport.gate.flow.roles-liberacao-manual=${GATE_ROLES_LIBERACAO_MANUAL:ROLE_OPERADOR_GATE}
cloudport.gate.ocr.tempo-maximo-processamento=${GATE_OCR_TIMEOUT:PT5S}
cloudport.gate.ocr.retry-atraso=${GATE_OCR_RETRY_DELAY:PT1M}
cloudport.gate.ocr.processamento-expirado=${GATE_OCR_STALE_AFTER:PT10M}
cloudport.gate.ocr.max-tentativas=${GATE_OCR_MAX_ATTEMPTS:3}
cloudport.gate.ocr.recuperacao-ms=${GATE_OCR_RECOVERY_MS:60000}
cloudport.gate.ocr.executor.core-size=${GATE_OCR_EXECUTOR_CORE_SIZE:1}
cloudport.gate.ocr.executor.max-size=${GATE_OCR_EXECUTOR_MAX_SIZE:2}
cloudport.gate.ocr.executor.queue-capacity=${GATE_OCR_EXECUTOR_QUEUE_CAPACITY:50}
cloudport.gate.contingencia.enabled=${GATE_CONTINGENCIA_ENABLED:false}
cloudport.gate.contingencia.orientacao-operador=${GATE_CONTINGENCIA_ORIENTACAO:Acione o playbook de contingencia do gate.}
cloudport.gate.agendamento.rules.antecedencia-minima=${AGENDAMENTO_ANTECEDENCIA_MINIMA:PT2H}
cloudport.gate.agendamento.rules.atraso-maximo=${AGENDAMENTO_ATRASO_MAXIMO:PT1H}
cloudport.gate.agendamento.rules.edicao-antecedencia=${AGENDAMENTO_EDICAO_ANTECEDENCIA:PT12H}
cloudport.gate.agendamento.rules.edicao-atraso=${AGENDAMENTO_EDICAO_ATRASO:PT2H}
cloudport.gate.alertas.webhook-url=${GATE_ALERTAS_WEBHOOK_URL:}
cloudport.gate.alertas.bearer-token=${GATE_ALERTAS_BEARER_TOKEN:}
cloudport.gate.alertas.timeout=${GATE_ALERTAS_TIMEOUT:PT5S}

gate.barcode.habilitado=${GATE_BARCODE_HABILITADO:false}
gate.barcode.timeout-confirmacao=${GATE_BARCODE_TIMEOUT:PT30S}
gate.barcode.falhar-sem-confirmacao=${GATE_BARCODE_FALHAR_SEM_CONFIRMACAO:false}
dmt.rabbitmq.exchange=${DMT_RABBITMQ_EXCHANGE:dmt-barcode-exchange}
dmt.rabbitmq.routing-key=${DMT_RABBITMQ_ROUTING_KEY:barcode.confirmacao.solicitacao}
gate.reconciliacao.cron=${GATE_RECONCILIACAO_CRON:0 0 2 * * *}
gate.reconciliacao.alerta-lease=${GATE_RECONCILIACAO_ALERTA_LEASE:PT2M}

cloudport.document-storage.provider=${DOCUMENT_STORAGE_PROVIDER:local}
cloudport.document-storage.base-path=${DOCUMENT_STORAGE_BASE_PATH:/var/lib/cloudport/documents}
cloudport.document-storage.bucket=${DOCUMENT_STORAGE_BUCKET:cloudport-documents}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}
