name: Aplicar correção SQL do painel de Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  corrigir:
    if: github.event.pull_request.head.ref == 'fix/gate-painel-sql-20260719-b72e'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar branch do pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Corrigir ordenação incompatível com GROUP BY
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          arquivo = Path("backend/servico-gate/src/main/java/br/com/cloudport/servicogate/app/operacional/GateOperacionalService.java")
          conteudo = arquivo.read_text(encoding="utf-8")
          trecho_invalido = "                  ORDER BY gc.id, gl.codigo"
          trecho_corrigido = "                  ORDER BY gl.gate_id, gl.codigo"

          ocorrencias = conteudo.count(trecho_invalido)
          if ocorrencias != 1:
              raise SystemExit(f"Esperada 1 ocorrência do SQL inválido; encontradas {ocorrencias}.")

          arquivo.write_text(conteudo.replace(trecho_invalido, trecho_corrigido), encoding="utf-8")
          PY

      - name: Validar alteração
        shell: bash
        run: |
          git diff --check
          grep -F "ORDER BY gl.gate_id, gl.codigo" backend/servico-gate/src/main/java/br/com/cloudport/servicogate/app/operacional/GateOperacionalService.java
          ! grep -F "ORDER BY gc.id, gl.codigo" backend/servico-gate/src/main/java/br/com/cloudport/servicogate/app/operacional/GateOperacionalService.java

      - name: Remover automação temporária e publicar correção
        shell: bash
        run: |
          rm .github/workflows/fix-gate-painel-sql-b72e.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/servico-gate/src/main/java/br/com/cloudport/servicogate/app/operacional/GateOperacionalService.java .github/workflows/fix-gate-painel-sql-b72e.yml
          git commit -m "fix(gate): corrigir SQL do painel operacional"
          git push origin HEAD:${{ github.head_ref }}
