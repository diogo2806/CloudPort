<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    Content-Security-Policy de base (mitigação de XSS recomendada no SECURITY_NOTES).
    Em produção, prefira definir o CSP por cabeçalho HTTP no gateway/servidor, onde
    também é possível usar frame-ancestors, e ajuste connect-src para as origens reais.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8080 http://localhost:8081 http://localhost:8082 http://localhost:8083 http://localhost:8084 ws://localhost:8081 wss://localhost:8081 ws://localhost:4200 wss://localhost:4200; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Cloudport</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="mat-typography">
  <app-root></app-root> 
</body>
</html>
