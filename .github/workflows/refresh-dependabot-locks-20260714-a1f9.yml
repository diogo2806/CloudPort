name: Diagnose Dependabot lockfiles

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: chore/dependabot-alerts-20260714-a1f9

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture npm resolution error
        shell: bash
        working-directory: frontend/cloudport
        run: |
          set +e
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --force > ../../npm-cloudport-resolution.log 2>&1
          status=$?
          cat ../../npm-cloudport-resolution.log
          echo "exit_code=$status" >> ../../npm-cloudport-resolution.log
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add npm-cloudport-resolution.log
          git commit -m "chore: registra diagnóstico temporário do npm" || exit 0
          git push origin HEAD:chore/dependabot-alerts-20260714-a1f9
