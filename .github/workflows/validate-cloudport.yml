name: Validar CloudPort

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: backend/servico-autenticacao
            command: mvn -B -DskipTests package
          - module: backend/servico-gate
            command: >-
              mvn -B -Dtest=SecurityConfigTest test &&
              mvn -B -DskipTests package
          - module: backend/servico-rail
            command: mvn -B -DskipTests package
          - module: backend/servico-visibilidade
            command: mvn -B test package
          - module: backend/servico-yard
            command: >-
              mvn -B -Dtest=OtimizadorRotasPatioServicoTest,OtimizadorDualCyclingServicoTest test &&
              mvn -B -DskipTests package
          - module: backend/servico-navio
            command: mvn -B -DskipTests package
          - module: backend/servico-navio-siderurgico
            command: mvn -B -DskipTests package
          - module: backend/cloudport-navio-modules
            command: >-
              mvn -B -Pmodulo-monolito
              -pl :servico-navio,:servico-navio-siderurgico
              -DskipTests install &&
              mvn -B -Pmodulo-monolito
              -pl :cloudport-monolito-navio
              test package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar e validar
        working-directory: ${{ matrix.module }}
        run: ${{ matrix.command }}

  frontend:
    name: Frontend ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Portal Angular
            module: frontend/cloudport
            install: npm ci
            test: ''
          - name: Control Room React
            module: frontend/servico-navio-siderurgico
            install: npm install --no-audit --no-fund
            test: npm test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        working-directory: ${{ matrix.module }}
        run: ${{ matrix.install }}
      - name: Testar
        if: matrix.test != ''
        working-directory: ${{ matrix.module }}
        run: ${{ matrix.test }}
      - name: Compilar
        working-directory: ${{ matrix.module }}
        run: npm run build

  deployment-navio:
    name: Smoke do deploy unificado de Navio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar Docker Compose
        run: |
          docker compose -f deploy/navio-monolito/docker-compose.yml --profile monolito config
          SMOKE_JWT_SECRET="$(openssl rand -hex 32)" \
          SMOKE_SERVICE_KEY="$(openssl rand -hex 24)" \
          docker compose \
            -f deploy/navio-monolito/docker-compose.yml \
            -f deploy/navio-monolito/docker-compose.smoke.yml \
            --profile monolito config
      - name: Executar smoke test completo
        run: bash deploy/navio-monolito/smoke-test.sh
