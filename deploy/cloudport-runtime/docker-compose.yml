name: cloudport-runtime

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - cloudport-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  rabbitmq:
    profiles: ["messaging"]
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-cloudport}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-}
    volumes:
      - cloudport-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cloudport-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [cloudport]

  cloudport-runtime:
    image: ${CLOUDPORT_RUNTIME_IMAGE:-cloudport-runtime:local}
    build:
      context: ../..
      dockerfile: backend/cloudport-runtime/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_SCHEMA: ${DB_SCHEMA}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-8}
      DB_POOL_CONNECTION_TIMEOUT_MS: ${DB_POOL_CONNECTION_TIMEOUT_MS:-30000}
      DB_POOL_IDLE_TIMEOUT_MS: ${DB_POOL_IDLE_TIMEOUT_MS:-300000}
      DB_POOL_MAX_LIFETIME_MS: ${DB_POOL_MAX_LIFETIME_MS:-1800000}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JAVA_MAX_RAM_PERCENTAGE: ${JAVA_MAX_RAM_PERCENTAGE:-65.0}
      JAVA_THREAD_STACK_SIZE: ${JAVA_THREAD_STACK_SIZE:-512k}
      JAVA_MAX_METASPACE_SIZE: ${JAVA_MAX_METASPACE_SIZE:-384m}
      JAVA_MAX_DIRECT_MEMORY_SIZE: ${JAVA_MAX_DIRECT_MEMORY_SIZE:-256m}
      SPRING_MAIN_LAZY_INITIALIZATION: ${SPRING_MAIN_LAZY_INITIALIZATION:-true}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS:-2}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-50}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS:-1000}
      ASYNC_CORE_POOL_SIZE: ${ASYNC_CORE_POOL_SIZE:-2}
      ASYNC_MAX_POOL_SIZE: ${ASYNC_MAX_POOL_SIZE:-4}
      ASYNC_QUEUE_CAPACITY: ${ASYNC_QUEUE_CAPACITY:-100}
      ASYNC_KEEP_ALIVE: ${ASYNC_KEEP_ALIVE:-60s}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-false}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-cloudport}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-}
      RABBITMQ_STARTUP_ATTEMPTS: ${RABBITMQ_STARTUP_ATTEMPTS:-30}
      RABBITMQ_STARTUP_INTERVAL_SECONDS: ${RABBITMQ_STARTUP_INTERVAL_SECONDS:-2}
      RABBITMQ_STARTUP_TIMEOUT_SECONDS: ${RABBITMQ_STARTUP_TIMEOUT_SECONDS:-2}
      RABBITMQ_LISTENER_CONCURRENCY: ${RABBITMQ_LISTENER_CONCURRENCY:-1}
      RABBITMQ_LISTENER_MAX_CONCURRENCY: ${RABBITMQ_LISTENER_MAX_CONCURRENCY:-1}
      RABBITMQ_LISTENER_PREFETCH: ${RABBITMQ_LISTENER_PREFETCH:-10}
      REDIS_USER: ${REDIS_USER:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-}
      CLOUDPORT_SECURITY_INTERNAL_SERVICE_KEY: ${CLOUDPORT_INTERNAL_SERVICE_KEY}
      CLOUDPORT_PUBLIC_API_CLIENTS: ${CLOUDPORT_PUBLIC_API_CLIENTS:-}
      CLOUDPORT_SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS}
      CLOUDPORT_RUNTIME_INSTANCE_ID: ${CLOUDPORT_RUNTIME_INSTANCE_ID:-cloudport-runtime-1}
      CLOUDPORT_RUNTIME_REVISAO: ${CLOUDPORT_RUNTIME_REVISAO:-local}
      CLOUDPORT_RUNTIME_CUTOVER_WRITES_ENABLED: ${CLOUDPORT_RUNTIME_CUTOVER_WRITES_ENABLED:-true}
      CLOUDPORT_RUNTIME_JOBS_ENABLED: ${CLOUDPORT_RUNTIME_JOBS_ENABLED:-true}
      CLOUDPORT_RUNTIME_CONSUMERS_ENABLED: ${CLOUDPORT_RUNTIME_CONSUMERS_ENABLED:-false}
      CLOUDPORT_MODULO_AUTENTICACAO_INTEGRACAO: local
      CLOUDPORT_MODULO_NAVIO_INTEGRACAO: local
      CLOUDPORT_MODULO_YARD_INTEGRACAO: local
      TOS_API_BASE_URL: ${TOS_API_BASE_URL}
      TOS_API_CACHE_MAX_SIZE: ${TOS_API_CACHE_MAX_SIZE:-200}
      GATE_OCR_EXECUTOR_CORE_SIZE: ${GATE_OCR_EXECUTOR_CORE_SIZE:-1}
      GATE_OCR_EXECUTOR_MAX_SIZE: ${GATE_OCR_EXECUTOR_MAX_SIZE:-2}
      GATE_OCR_EXECUTOR_QUEUE_CAPACITY: ${GATE_OCR_EXECUTOR_QUEUE_CAPACITY:-50}
      GATE_ALERTAS_WEBHOOK_URL: ${GATE_ALERTAS_WEBHOOK_URL:-}
      GATE_ALERTAS_BEARER_TOKEN: ${GATE_ALERTAS_BEARER_TOKEN:-}
      DOCUMENT_STORAGE_BASE_PATH: /var/lib/cloudport/documents
    volumes:
      - cloudport-documents:/var/lib/cloudport/documents
    ports:
      - "${CLOUDPORT_PUBLIC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [cloudport]

volumes:
  cloudport-postgres:
  cloudport-rabbitmq:
  cloudport-redis:
  cloudport-documents:

networks:
  cloudport:
    name: ${CLOUDPORT_NETWORK_NAME:-cloudport-runtime}
