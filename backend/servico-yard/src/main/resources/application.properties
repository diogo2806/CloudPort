server.port=${YARD_SERVER_PORT:8081}

spring.application.name=servico-yard

spring.datasource.url=${YARD_DB_URL:jdbc:postgresql://localhost:5432/servico_yard}
spring.datasource.username=${YARD_DB_USERNAME:postgres}
spring.datasource.password=${YARD_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=${YARD_FLYWAY_SCHEMA:cloudport_yard}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${YARD_FLYWAY_SCHEMA:cloudport_yard}
spring.flyway.schemas=${YARD_FLYWAY_SCHEMA:cloudport_yard}

spring.rabbitmq.host=${YARD_RABBIT_HOST:localhost}
spring.rabbitmq.port=${YARD_RABBIT_PORT:5672}
spring.rabbitmq.username=${YARD_RABBIT_USERNAME:guest}
spring.rabbitmq.password=${YARD_RABBIT_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# Segurança: valida o token JWT emitido pelo serviço de autenticação e a chave entre serviços.
cloudport.security.jwt.secret=${JWT_SECRET}
cloudport.security.internal-service-key=${CLOUDPORT_INTERNAL_SERVICE_KEY:}
cloudport.security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Cadastro e visita canônicos usados pelos planejadores de estiva.
cloudport.modulo.navio.integracao=${CLOUDPORT_NAVIO_INTEGRACAO:http}
cloudport.integracao.navio.base-url=${NAVIO_SERVICE_URL:http://localhost:8084}
cloudport.integracao.navio-siderurgico.base-url=${SIDERURGICO_SERVICE_URL:http://localhost:8085}

# Durante a migração somente um deployment pode iniciar consumidores RabbitMQ.
cloudport.runtime.consumers-enabled=${CLOUDPORT_CONSUMERS_ENABLED:true}

cloudport.yard.eventos.exchange=${YARD_EVENTOS_EXCHANGE:yard.eventos}
cloudport.yard.eventos.routing-movimento=${YARD_EVENTOS_ROUTING_MOVIMENTO:yard.movimento.registrado}
cloudport.yard.integracoes.ferrovia.exchange=${YARD_FERROVIA_EXCHANGE:ferrovia.eventos}
cloudport.yard.integracoes.ferrovia.queue=${YARD_FERROVIA_QUEUE:yard.movimentacao.trem}
cloudport.yard.integracoes.ferrovia.routing=${YARD_FERROVIA_ROUTING:rail.movimentacao.concluida}

# EDI Integration (BAPLIE/COPRAR/COARRI)
cloudport.yard.integracoes.edi.exchange=${EDI_EXCHANGE:edi.mensagens}
cloudport.yard.integracoes.edi.queue.coprar=${EDI_QUEUE_COPRAR:edi.mensagens.coprar}
cloudport.yard.integracoes.edi.queue.coarri=${EDI_QUEUE_COARRI:edi.mensagens.coarri}
cloudport.yard.integracoes.edi.routing.coprar=${EDI_ROUTING_COPRAR:edi.coprar}
cloudport.yard.integracoes.edi.routing.coarri=${EDI_ROUTING_COARRI:edi.coarri}
