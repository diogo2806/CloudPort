server:
  port: 8085

spring:
  application:
    name: servico-visibilidade

  datasource:
    url: jdbc:postgresql://localhost:5432/cloudport_visibilidade
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10

  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    timeout: 60000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081  # servico-autenticacao

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.cloudport.visibilidade: DEBUG
    org.springframework.amqp: INFO